name: Makefile CI

on:
  push:
    branches: [ "main", "port-rust" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable

    - name: Test
      run: make test

    - name: Build
      run: make build

    - name: Verify source
      run: make verify

    - name: Install
      run: make install PREFIX="$RUNNER_TEMP/sql-doctor"

    - name: Verify install
      run: make verify-install PREFIX="$RUNNER_TEMP/sql-doctor"
