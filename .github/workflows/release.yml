name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Test
        run: cargo test
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/sql_doctor" dist/sql_doctor
          tar -C dist -czf "sql_doctor-${{ matrix.target }}.tar.gz" sql_doctor
          shasum -a 256 "sql_doctor-${{ matrix.target }}.tar.gz" > "sql_doctor-${{ matrix.target }}.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sql_doctor-${{ matrix.target }}
          path: |
            sql_doctor-${{ matrix.target }}.tar.gz
            sql_doctor-${{ matrix.target }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Build checksums file
        run: |
          cat artifacts/*.sha256 > artifacts/checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
