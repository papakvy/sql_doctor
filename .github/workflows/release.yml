name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Test
        run: cargo test
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/sql_doctor" dist/sql_doctor
          tar -C dist -czf "sql_doctor-${{ matrix.target }}.tar.gz" sql_doctor
          shasum -a 256 "sql_doctor-${{ matrix.target }}.tar.gz" > "sql_doctor-${{ matrix.target }}.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sql_doctor-${{ matrix.target }}
          path: |
            sql_doctor-${{ matrix.target }}.tar.gz
            sql_doctor-${{ matrix.target }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --tags --force
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Build release notes
        run: |
          {
            echo "# sql_doctor ${GITHUB_REF_NAME}"
            echo
            echo "Changelog since v1.0.3"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' v1.0.3..HEAD
          } > release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
      - name: Cleanup older releases and tags
        uses: actions/github-script@v8
        with:
          script: |
            const currentTag = context.ref.startsWith('refs/tags/') ? context.ref.replace('refs/tags/', '') : null;
            if (!currentTag) {
              core.info('Not running from a tag ref; skipping cleanup.');
              return;
            }

            const keep = new Set(['v1.0.3', currentTag]);
            const { owner, repo } = context.repo;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            for (const release of releases) {
              if (!keep.has(release.tag_name)) {
                core.info(`Deleting release ${release.tag_name}`);
                await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
              }
            }

            const refs = await github.paginate(github.rest.git.listMatchingRefs, {
              owner,
              repo,
              ref: 'tags/',
            });
            for (const ref of refs) {
              const tag = ref.ref.replace('refs/tags/', '');
              if (!keep.has(tag)) {
                core.info(`Deleting tag ${tag}`);
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              }
            }
