name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Test
        run: cargo test
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/sql_doctor" dist/sql_doctor
          tar -C dist -czf "sql_doctor-${{ matrix.target }}.tar.gz" sql_doctor
          shasum -a 256 "sql_doctor-${{ matrix.target }}.tar.gz" > "sql_doctor-${{ matrix.target }}.sha256"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: sql_doctor-${{ matrix.target }}
          path: |
            sql_doctor-${{ matrix.target }}.tar.gz
            sql_doctor-${{ matrix.target }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --tags --force
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Build release notes
        run: |
          prev_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          {
            echo "# sql_doctor ${GITHUB_REF_NAME}"
            echo
            if [[ -n "$prev_tag" ]]; then
              echo "Changelog since ${prev_tag}"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${prev_tag}..HEAD"
            else
              echo "Changelog"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' HEAD
            fi
          } > release-notes.md
      - uses: softprops/action-gh-release@v3
        with:
          body_path: release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256

